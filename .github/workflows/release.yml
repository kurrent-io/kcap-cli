name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: read

env:
  DOTNET_VERSION: '10.0.x'
  CLI_PROJECT: src/kapacitor/kapacitor.csproj
  DAEMON_PROJECT: src/Kapacitor.Daemon/Kapacitor.Daemon.csproj

jobs:
  ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.sha }}
          check-regexp: '^(Build and test|AOT publish check.*)$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          checks-discovery-timeout: 300

  build:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
            npm-package: kapacitor-darwin-arm64
            cli-binary: kapacitor
            daemon-binary: kapacitor-daemon
          - rid: linux-x64
            os: ubuntu-latest
            npm-package: kapacitor-linux-x64
            cli-binary: kapacitor
            daemon-binary: kapacitor-daemon
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            npm-package: kapacitor-linux-arm64
            cli-binary: kapacitor
            daemon-binary: kapacitor-daemon
          - rid: linux-musl-x64
            os: ubuntu-latest
            container: alpine:3.20
            npm-package: kapacitor-linux-musl-x64
            cli-binary: kapacitor
            daemon-binary: kapacitor-daemon
          - rid: linux-musl-arm64
            os: ubuntu-24.04-arm
            npm-package: kapacitor-linux-musl-arm64
            cli-binary: kapacitor
            daemon-binary: kapacitor-daemon
          - rid: win-x64
            os: windows-latest
            npm-package: kapacitor-win-x64
            cli-binary: kapacitor.exe
            daemon-binary: kapacitor-daemon.exe

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      - name: Install Alpine build dependencies
        if: matrix.container != ''
        shell: sh
        run: |
          apk add --no-cache bash curl git icu-libs krb5-libs libgcc libstdc++ zlib clang build-base zlib-dev linux-headers

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && !matrix.container
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev ${{ contains(matrix.rid, 'musl') && 'musl-tools' || '' }}

      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish CLI AOT binary
        run: >
          dotnet publish ${{ env.CLI_PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}
          -o publish/cli/

      - name: Publish daemon AOT binary
        run: >
          dotnet publish ${{ env.DAEMON_PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}
          -o publish/daemon/

      # The daemon's UnixPtyInterop hard-imports libpty_shim on macOS ARM64. If
      # the macOS-only build target ever silently fails to produce the dylib,
      # the npm package would ship a daemon that crashes on PTY resize. Fail
      # loudly here instead of distributing a broken artifact.
      - name: Verify libpty_shim built (osx-arm64)
        if: matrix.rid == 'osx-arm64'
        shell: bash
        run: |
          if [ ! -f publish/daemon/libpty_shim.dylib ]; then
            echo "::error::libpty_shim.dylib missing from publish/daemon/ on osx-arm64"
            ls -la publish/daemon/
            exit 1
          fi

      - name: Copy binaries to npm package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm-package }}/bin
          cp publish/cli/${{ matrix.cli-binary }} npm/${{ matrix.npm-package }}/bin/
          cp publish/daemon/${{ matrix.daemon-binary }} npm/${{ matrix.npm-package }}/bin/
          if [ -f publish/daemon/libpty_shim.dylib ]; then
            cp publish/daemon/libpty_shim.dylib npm/${{ matrix.npm-package }}/bin/
          fi

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p archive
          cp publish/cli/${{ matrix.cli-binary }} archive/
          cp publish/daemon/${{ matrix.daemon-binary }} archive/
          if [ -f publish/daemon/libpty_shim.dylib ]; then
            cp publish/daemon/libpty_shim.dylib archive/
          fi
          cd archive
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            7z a ../kapacitor-${{ matrix.rid }}.zip *
          else
            tar czf ../kapacitor-${{ matrix.rid }}.tar.gz *
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-${{ matrix.npm-package }}
          path: npm/${{ matrix.npm-package }}/

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: kapacitor-${{ matrix.rid }}.*

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all npm artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          path: npm-artifacts/

      - name: Update package versions and publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          for dir in npm-artifacts/npm-kapacitor-*/; do
            pkg_name=$(basename "$dir" | sed 's/^npm-//')
            cp "npm/$pkg_name/package.json" "$dir/package.json"

            # actions/upload-artifact + download-artifact round-trips through ZIP,
            # which drops the executable bit. The platform packages have no `bin`
            # field in package.json (the wrapper resolves the binary path
            # manually), so npm won't restore +x at install time either. Set it
            # explicitly here so the published tarball ships executable files.
            #
            # Each platform package contains a CLI binary (kapacitor / kapacitor.exe)
            # AND a daemon binary (kapacitor-daemon / kapacitor-daemon.exe).
            # Pick by file existence instead of pkg_name pattern so adding new
            # RIDs doesn't silently regress this step.
            found_cli=false
            for bin in kapacitor kapacitor.exe kapacitor-daemon kapacitor-daemon.exe; do
              if [ -f "$dir/bin/$bin" ]; then
                chmod +x "$dir/bin/$bin"
                case "$bin" in kapacitor|kapacitor.exe) found_cli=true ;; esac
              fi
            done
            if [ "$found_cli" != "true" ]; then
              echo "::error::No kapacitor binary found in $dir/bin (contents: $(ls "$dir/bin" 2>&1))"
              exit 1
            fi

            cd "$dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm publish --access public
            cd -
          done

      - name: Update plugin version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          node -e "
            const pkg = require('./kapacitor/.claude-plugin/plugin.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./kapacitor/.claude-plugin/plugin.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Copy plugin into wrapper package
        run: cp -r kapacitor/ npm/kapacitor/kapacitor/

      - name: Publish wrapper package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd npm/kapacitor
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all release archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
