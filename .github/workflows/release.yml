name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: read
  id-token: write

env:
  DOTNET_VERSION: '10.0.x'
  CLI_PROJECT: src/Capacitor.Cli/Capacitor.Cli.csproj
  DAEMON_PROJECT: src/Capacitor.Cli.Daemon/Capacitor.Cli.Daemon.csproj

jobs:
  ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.sha }}
          check-regexp: '^(Build and test|AOT publish check.*)$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          checks-discovery-timeout: 300

  build:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
            npm-package: kcap-darwin-arm64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-x64
            os: ubuntu-latest
            npm-package: kcap-linux-x64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            npm-package: kcap-linux-arm64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-musl-x64
            os: ubuntu-latest
            container: alpine:3.20
            npm-package: kcap-linux-musl-x64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-musl-arm64
            os: ubuntu-24.04-arm
            npm-package: kcap-linux-musl-arm64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: win-x64
            os: windows-latest
            npm-package: kcap-win-x64
            cli-binary: kcap.exe
            daemon-binary: kcap-daemon.exe

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      - name: Install Alpine build dependencies
        if: matrix.container != ''
        shell: sh
        run: |
          apk add --no-cache bash curl git icu-libs krb5-libs libgcc libstdc++ zlib clang build-base zlib-dev linux-headers

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && !matrix.container
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev ${{ contains(matrix.rid, 'musl') && 'musl-tools' || '' }}

      # musl-tools (installed above) provides the musl-gcc cross-compiler CompilePtyShim needs
      # for the two musl RIDs on a native (non-container) runner. Fail loudly here if the
      # install silently didn't provide it, rather than inside the opaque CompilePtyShim Exec.
      # Skipped under matrix.container: the Alpine path below installs its own native
      # build-base toolchain (cc/gcc against musl libc directly), no musl-gcc cross-compiler
      # needed there.
      - name: Verify musl toolchain (musl RIDs only)
        if: contains(matrix.rid, 'musl') && !matrix.container
        run: musl-gcc --version

      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish CLI AOT binary
        run: >
          dotnet publish ${{ env.CLI_PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}
          -o publish/cli/

      - name: Publish daemon AOT binary
        run: >
          dotnet publish ${{ env.DAEMON_PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}
          -o publish/daemon/

      # The daemon's UnixPtyInterop hard-imports libpty_shim on every non-win-x64 RID (macOS
      # ARM64's variadic-ioctl workaround, and every Linux RID's containment shim as of L1-build).
      # If CompilePtyShim ever silently fails to produce the shim for a given RID, the npm
      # package would ship a daemon that crashes on first PTY use. Fail loudly here instead of
      # distributing a broken artifact.
      - name: Verify libpty_shim built
        if: matrix.rid != 'win-x64'
        shell: bash
        run: |
          ext="so"
          if [[ "${{ matrix.rid }}" == osx-* ]]; then ext="dylib"; fi
          if [ ! -f "publish/daemon/libpty_shim.$ext" ]; then
            echo "::error::libpty_shim.$ext missing from publish/daemon/ on ${{ matrix.rid }}"
            ls -la publish/daemon/
            exit 1
          fi

      # Per-RID acceptance beyond "the file exists": the shim's recorded machine type must match
      # the RID it was built for (catches a wrong-arch artifact that would otherwise only fail at
      # runtime on the target device), and it must actually be loadable and callable, not just a
      # correctly-named file (reuses the Task 4 NativeTestHost's spawn-dummy mode, which loads
      # the shim and calls the real production pty_spawn path end to end).
      - name: Verify shim machine type and load-and-call smoke
        if: matrix.rid != 'win-x64'
        shell: bash
        run: |
          set -euo pipefail
          ext="so"; if [[ "${{ matrix.rid }}" == osx-* ]]; then ext="dylib"; fi
          shim="publish/daemon/libpty_shim.$ext"

          case "${{ matrix.rid }}" in
            *-arm64) want_arch="arm64|aarch64" ;;
            *-x64)   want_arch="x86-64|x86_64" ;;
          esac

          if [[ "$ext" == "dylib" ]]; then
            actual=$(lipo -info "$shim" | grep -oE 'arm64|x86_64' | head -1)
          else
            actual=$(readelf -h "$shim" | grep -i "Machine:" | grep -oE 'X86-64|AArch64' | tr '[:upper:]' '[:lower:]')
          fi

          if ! echo "$actual" | grep -qEi "$want_arch"; then
            echo "::error::libpty_shim machine type ($actual) does not match RID ${{ matrix.rid }} (expected $want_arch)"
            exit 1
          fi

          # Load-and-call smoke: spawn-dummy loads the shim (built for THIS RID, right next to
          # the daemon build output) via the SAME UnixPtyProcessFactory/pty_spawn path the
          # daemon itself uses in production, and prints a PID= line once the child exists.
          # Building/running via `dotnet run` (rather than the AOT-published daemon binary)
          # keeps this step independent of the publish/npm-packaging steps below, at the cost of
          # a JIT run instead of the AOT one; acceptable here since this is a load/call smoke,
          # not a perf or AOT-compatibility check (AOT publish itself is already exercised by
          # "Publish daemon AOT binary" above).
          #
          # A musl RID's build output (musl-linked apphost and shim) cannot execute on a glibc
          # runner at all, so the load-and-call smoke only runs where the host libc matches the
          # RID: linux-musl-x64 runs it inside its Alpine container; linux-musl-arm64 (glibc
          # arm64 runner, no container) gets the machine-type check above only.
          if [[ "${{ matrix.rid }}" == *musl* && ! -f /etc/alpine-release ]]; then
            echo "Skipping load-and-call smoke: musl build output cannot execute on a glibc host"
            exit 0
          fi

          # Build synchronously first: a cold `dotnet run` (restore + build) takes far longer
          # than any fixed grace period, so the backgrounded run below must only have to start
          # the already-built host.
          dotnet build test/Capacitor.Cli.Tests.Unit.NativeTestHost -r ${{ matrix.rid }} -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}
          dotnet run --no-build --project test/Capacitor.Cli.Tests.Unit.NativeTestHost -r ${{ matrix.rid }} -- spawn-dummy > smoke-output.txt 2>&1 &
          HOST_PID=$!

          # spawn-dummy blocks forever by design (it's the PDEATHSIG test host), so poll for
          # the PID= line rather than sleeping a fixed interval, then tear the host down with a
          # SIGKILL fallback — this step must never hang on a host that ignores SIGTERM.
          ok=0
          for _ in $(seq 1 60); do
            if grep -q '^PID=' smoke-output.txt 2>/dev/null; then ok=1; break; fi
            if ! kill -0 "$HOST_PID" 2>/dev/null; then break; fi
            sleep 1
          done
          pkill -TERM -P "$HOST_PID" 2>/dev/null || true
          kill "$HOST_PID" 2>/dev/null || true
          sleep 1
          kill -9 "$HOST_PID" 2>/dev/null || true
          wait "$HOST_PID" 2>/dev/null || true
          cat smoke-output.txt
          if [[ "$ok" -ne 1 ]]; then
            echo "::error::load-and-call smoke did not see a PID= line from spawn-dummy on ${{ matrix.rid }}"
            exit 1
          fi

      # macOS-only: the mac: incarnation-identity scheme (design spec §4.3, M1-A) has no useful
      # emulation off real hardware, so its one CI acceptance gate is a runtime-capture smoke
      # here in the per-RID packaging checks — capture this process's own identity and a spawned
      # child's, and assert both are present and distinct (proves the kernel primitive actually
      # works and varies per process, not a mock). ci.yml has no macOS runner at all, so this
      # cannot live there — see the Global Constraints note in the design spec.
      - name: Verify mac incarnation-identity runtime capture (osx-arm64 only)
        if: startsWith(matrix.rid, 'osx-')
        shell: bash
        run: |
          set -euo pipefail
          dotnet run --project test/Capacitor.Cli.Tests.Unit.NativeTestHost -r ${{ matrix.rid }} -- mac-identity-smoke

      # `kcap import --opencode` reads opencode.db via Microsoft.Data.Sqlite +
      # SQLitePCLRaw.bundle_e_sqlite3. NativeAOT does NOT statically link the engine and we
      # deliberately do NOT bundle it (it's only needed for OpenCode import) — instead the
      # CLI downloads it on demand from this release's assets (SqliteNativeResolver).
      # Source the per-RID native straight from the publish output: it's exactly the bytes
      # the binary was built against (== the pinned SHA-256 in SqliteNativeResolver) and is
      # always present, unlike a NuGet cache path that may be absent/polluted on a clean
      # runner. Name it to match the resolver's pin table: <basename>-<rid>.<ext>
      # (e.g. libe_sqlite3-osx-arm64.dylib, e_sqlite3-win-x64.dll).
      - name: Stage e_sqlite3 native release asset
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"

          # Require exactly one match. nullglob so zero matches is an empty array (not the
          # literal pattern), and avoids set -e aborting mid-assignment before we can report.
          shopt -s nullglob
          matches=(publish/cli/*e_sqlite3*)
          shopt -u nullglob
          if [ "${#matches[@]}" -ne 1 ]; then
            echo "::error::expected exactly one e_sqlite3 native in publish/cli for $rid, found ${#matches[@]}"
            ls -la publish/cli/ || true
            exit 1
          fi
          src="${matches[0]}"

          # Verify the bytes match the SHA-256 the resolver pins for this RID (single source
          # of truth: src/Capacitor.Cli/Commands/SqliteNativeResolver.cs). A mismatch (e.g.
          # publish post-processed the native) would ship an asset that every cold-cache
          # OpenCode import fails to verify — fail the release here instead.
          # `|| true`: a zero-match grep returns non-zero, which under `set -euo pipefail`
          # would abort the substitution before the actionable empty-check below can run.
          pin=$(grep -E "\[\"$rid\"\]" src/Capacitor.Cli/Commands/SqliteNativeResolver.cs \
                | grep -oE '[0-9a-f]{64}' | head -1 || true)
          if [ -z "$pin" ]; then
            echo "::error::no SqliteNativeResolver pin found for $rid"
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum "$src" | cut -d' ' -f1)
          else
            actual=$(shasum -a 256 "$src" | cut -d' ' -f1)
          fi
          if [ "$actual" != "$pin" ]; then
            echo "::error::e_sqlite3 native for $rid ($actual) does not match resolver pin ($pin)"
            exit 1
          fi

          mkdir -p sqlite-native
          base=$(basename "$src"); name="${base%.*}"; ext="${base##*.}"
          cp "$src" "sqlite-native/${name}-${rid}.${ext}"
          ls -la sqlite-native/

      - name: Copy binaries to npm package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm-package }}/bin
          cp publish/cli/${{ matrix.cli-binary }} npm/${{ matrix.npm-package }}/bin/
          cp publish/daemon/${{ matrix.daemon-binary }} npm/${{ matrix.npm-package }}/bin/
          for ext in so dylib; do
            if [ -f "publish/daemon/libpty_shim.$ext" ]; then
              cp "publish/daemon/libpty_shim.$ext" npm/${{ matrix.npm-package }}/bin/
            fi
          done

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p archive
          cp publish/cli/${{ matrix.cli-binary }} archive/
          cp publish/daemon/${{ matrix.daemon-binary }} archive/
          for ext in so dylib; do
            if [ -f "publish/daemon/libpty_shim.$ext" ]; then
              cp "publish/daemon/libpty_shim.$ext" archive/
            fi
          done
          cd archive
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            7z a ../kcap-${{ matrix.rid }}.zip *
          else
            tar czf ../kcap-${{ matrix.rid }}.tar.gz *
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-${{ matrix.npm-package }}
          path: npm/${{ matrix.npm-package }}/

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: kcap-${{ matrix.rid }}.*

      # Per-RID SQLite native, downloaded on demand by SqliteNativeResolver. Named
      # release-* so the github-release job's `pattern: release-*` publishes it.
      - name: Upload e_sqlite3 native asset
        uses: actions/upload-artifact@v7
        with:
          name: release-sqlite-native-${{ matrix.rid }}
          path: sqlite-native/

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing (OIDC) requires npm >= 11.5.1. Pin a known-good
      # npm 11 release; npm 12.0.0 has a broken bundled sigstore dependency.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.18.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Derive npm dist-tag
        id: disttag
        run: echo "TAG=$(bash scripts/npm-dist-tag.sh '${{ steps.version.outputs.VERSION }}')" >> "$GITHUB_OUTPUT"

      - name: Download all npm artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          path: npm-artifacts/

      - name: Update package versions and publish platform packages
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          for dir in npm-artifacts/npm-kcap-*/; do
            pkg_name=$(basename "$dir" | sed 's/^npm-//')
            cp "npm/$pkg_name/package.json" "$dir/package.json"
            cp LICENSE.md "$dir/LICENSE.md"

            # actions/upload-artifact + download-artifact round-trips through ZIP,
            # which drops the executable bit. The platform packages have no `bin`
            # field in package.json (the wrapper resolves the binary path
            # manually), so npm won't restore +x at install time either. Set it
            # explicitly here so the published tarball ships executable files.
            #
            # Each platform package contains a CLI binary (kcap / kcap.exe)
            # AND a daemon binary (kcap-daemon / kcap-daemon.exe).
            # Pick by file existence instead of pkg_name pattern so adding new
            # RIDs doesn't silently regress this step.
            found_cli=false
            for bin in kcap kcap.exe kcap-daemon kcap-daemon.exe; do
              if [ -f "$dir/bin/$bin" ]; then
                chmod +x "$dir/bin/$bin"
                case "$bin" in kcap|kcap.exe) found_cli=true ;; esac
              fi
            done
            if [ "$found_cli" != "true" ]; then
              echo "::error::No kcap binary found in $dir/bin (contents: $(ls "$dir/bin" 2>&1))"
              exit 1
            fi

            cd "$dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm publish --access public --tag "${{ steps.disttag.outputs.TAG }}"
            cd -
          done

      - name: Update plugin version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          node -e "
            const pkg = require('./kcap/.claude-plugin/plugin.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./kcap/.claude-plugin/plugin.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Copy plugin into wrapper package
        run: cp -r kcap/ npm/kcap/kcap/

      - name: Copy license into wrapper package
        run: cp LICENSE.md npm/kcap/LICENSE.md

      - name: Publish wrapper package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd npm/kcap
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public --tag "${{ steps.disttag.outputs.TAG }}"

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all release archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
