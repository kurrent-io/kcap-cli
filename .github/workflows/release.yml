name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  checks: read
  id-token: write

env:
  DOTNET_VERSION: '10.0.x'
  CLI_PROJECT: src/Capacitor.Cli/Capacitor.Cli.csproj
  DAEMON_PROJECT: src/Capacitor.Cli.Daemon/Capacitor.Cli.Daemon.csproj

jobs:
  ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow to succeed
        uses: lewagon/wait-on-check-action@v1.6.1
        with:
          ref: ${{ github.sha }}
          check-regexp: '^(Build and test|AOT publish check.*)$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15
          checks-discovery-timeout: 300

  build:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
            npm-package: kcap-darwin-arm64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-x64
            os: ubuntu-latest
            npm-package: kcap-linux-x64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            npm-package: kcap-linux-arm64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-musl-x64
            os: ubuntu-latest
            container: alpine:3.20
            npm-package: kcap-linux-musl-x64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: linux-musl-arm64
            os: ubuntu-24.04-arm
            npm-package: kcap-linux-musl-arm64
            cli-binary: kcap
            daemon-binary: kcap-daemon
          - rid: win-x64
            os: windows-latest
            npm-package: kcap-win-x64
            cli-binary: kcap.exe
            daemon-binary: kcap-daemon.exe

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || '' }}

    steps:
      - name: Install Alpine build dependencies
        if: matrix.container != ''
        shell: sh
        run: |
          apk add --no-cache bash curl git icu-libs krb5-libs libgcc libstdc++ zlib clang build-base zlib-dev linux-headers

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && !matrix.container
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev ${{ contains(matrix.rid, 'musl') && 'musl-tools' || '' }}

      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish CLI AOT binary
        run: >
          dotnet publish ${{ env.CLI_PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}
          -o publish/cli/

      - name: Publish daemon AOT binary
        run: >
          dotnet publish ${{ env.DAEMON_PROJECT }}
          -c Release
          -r ${{ matrix.rid }}
          -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}
          -o publish/daemon/

      # The daemon's UnixPtyInterop hard-imports libpty_shim on macOS ARM64. If
      # the macOS-only build target ever silently fails to produce the dylib,
      # the npm package would ship a daemon that crashes on PTY resize. Fail
      # loudly here instead of distributing a broken artifact.
      - name: Verify libpty_shim built (osx-arm64)
        if: matrix.rid == 'osx-arm64'
        shell: bash
        run: |
          if [ ! -f publish/daemon/libpty_shim.dylib ]; then
            echo "::error::libpty_shim.dylib missing from publish/daemon/ on osx-arm64"
            ls -la publish/daemon/
            exit 1
          fi

      # `kcap import --opencode` reads opencode.db via Microsoft.Data.Sqlite +
      # SQLitePCLRaw.bundle_e_sqlite3. NativeAOT does NOT statically link the engine and we
      # deliberately do NOT bundle it (it's only needed for OpenCode import) — instead the
      # CLI downloads it on demand from this release's assets (SqliteNativeResolver).
      # Source the per-RID native straight from the publish output: it's exactly the bytes
      # the binary was built against (== the pinned SHA-256 in SqliteNativeResolver) and is
      # always present, unlike a NuGet cache path that may be absent/polluted on a clean
      # runner. Name it to match the resolver's pin table: <basename>-<rid>.<ext>
      # (e.g. libe_sqlite3-osx-arm64.dylib, e_sqlite3-win-x64.dll).
      - name: Stage e_sqlite3 native release asset
        shell: bash
        run: |
          set -euo pipefail
          rid="${{ matrix.rid }}"

          # Require exactly one match. nullglob so zero matches is an empty array (not the
          # literal pattern), and avoids set -e aborting mid-assignment before we can report.
          shopt -s nullglob
          matches=(publish/cli/*e_sqlite3*)
          shopt -u nullglob
          if [ "${#matches[@]}" -ne 1 ]; then
            echo "::error::expected exactly one e_sqlite3 native in publish/cli for $rid, found ${#matches[@]}"
            ls -la publish/cli/ || true
            exit 1
          fi
          src="${matches[0]}"

          # Verify the bytes match the SHA-256 the resolver pins for this RID (single source
          # of truth: src/Capacitor.Cli/Commands/SqliteNativeResolver.cs). A mismatch (e.g.
          # publish post-processed the native) would ship an asset that every cold-cache
          # OpenCode import fails to verify — fail the release here instead.
          pin=$(grep -E "\[\"$rid\"\]" src/Capacitor.Cli/Commands/SqliteNativeResolver.cs \
                | grep -oE '[0-9a-f]{64}' | head -1)
          if [ -z "$pin" ]; then
            echo "::error::no SqliteNativeResolver pin found for $rid"
            exit 1
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            actual=$(sha256sum "$src" | cut -d' ' -f1)
          else
            actual=$(shasum -a 256 "$src" | cut -d' ' -f1)
          fi
          if [ "$actual" != "$pin" ]; then
            echo "::error::e_sqlite3 native for $rid ($actual) does not match resolver pin ($pin)"
            exit 1
          fi

          mkdir -p sqlite-native
          base=$(basename "$src"); name="${base%.*}"; ext="${base##*.}"
          cp "$src" "sqlite-native/${name}-${rid}.${ext}"
          ls -la sqlite-native/

      - name: Copy binaries to npm package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm-package }}/bin
          cp publish/cli/${{ matrix.cli-binary }} npm/${{ matrix.npm-package }}/bin/
          cp publish/daemon/${{ matrix.daemon-binary }} npm/${{ matrix.npm-package }}/bin/
          if [ -f publish/daemon/libpty_shim.dylib ]; then
            cp publish/daemon/libpty_shim.dylib npm/${{ matrix.npm-package }}/bin/
          fi

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p archive
          cp publish/cli/${{ matrix.cli-binary }} archive/
          cp publish/daemon/${{ matrix.daemon-binary }} archive/
          if [ -f publish/daemon/libpty_shim.dylib ]; then
            cp publish/daemon/libpty_shim.dylib archive/
          fi
          cd archive
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            7z a ../kcap-${{ matrix.rid }}.zip *
          else
            tar czf ../kcap-${{ matrix.rid }}.tar.gz *
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-${{ matrix.npm-package }}
          path: npm/${{ matrix.npm-package }}/

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: kcap-${{ matrix.rid }}.*

      # Per-RID SQLite native, downloaded on demand by SqliteNativeResolver. Named
      # release-* so the github-release job's `pattern: release-*` publishes it.
      - name: Upload e_sqlite3 native asset
        uses: actions/upload-artifact@v7
        with:
          name: release-sqlite-native-${{ matrix.rid }}
          path: sqlite-native/

  publish-npm:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publishing (OIDC) requires npm >= 11.5.1. Node 24 ships
      # with npm 11.x but the exact patch can lag, so pin to latest explicitly.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all npm artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          path: npm-artifacts/

      - name: Update package versions and publish platform packages
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}

          for dir in npm-artifacts/npm-kcap-*/; do
            pkg_name=$(basename "$dir" | sed 's/^npm-//')
            cp "npm/$pkg_name/package.json" "$dir/package.json"
            cp LICENSE.md "$dir/LICENSE.md"

            # actions/upload-artifact + download-artifact round-trips through ZIP,
            # which drops the executable bit. The platform packages have no `bin`
            # field in package.json (the wrapper resolves the binary path
            # manually), so npm won't restore +x at install time either. Set it
            # explicitly here so the published tarball ships executable files.
            #
            # Each platform package contains a CLI binary (kcap / kcap.exe)
            # AND a daemon binary (kcap-daemon / kcap-daemon.exe).
            # Pick by file existence instead of pkg_name pattern so adding new
            # RIDs doesn't silently regress this step.
            found_cli=false
            for bin in kcap kcap.exe kcap-daemon kcap-daemon.exe; do
              if [ -f "$dir/bin/$bin" ]; then
                chmod +x "$dir/bin/$bin"
                case "$bin" in kcap|kcap.exe) found_cli=true ;; esac
              fi
            done
            if [ "$found_cli" != "true" ]; then
              echo "::error::No kcap binary found in $dir/bin (contents: $(ls "$dir/bin" 2>&1))"
              exit 1
            fi

            cd "$dir"
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npm publish --access public
            cd -
          done

      - name: Update plugin version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          node -e "
            const pkg = require('./kcap/.claude-plugin/plugin.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('./kcap/.claude-plugin/plugin.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Copy plugin into wrapper package
        run: cp -r kcap/ npm/kcap/kcap/

      - name: Copy license into wrapper package
        run: cp LICENSE.md npm/kcap/LICENSE.md

      - name: Publish wrapper package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cd npm/kcap
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all release archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
