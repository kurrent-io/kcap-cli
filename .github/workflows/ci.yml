name: CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
    tags:
      - 'v*'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build solution
        run: dotnet build Kapacitor.slnx

      - name: Run unit tests
        # --maximum-parallel-tests 1 serializes the entire unit suite.
        # The codebase has many tests that mutate process-global state
        # (Environment.SetEnvironmentVariable on HOME/PATH/KAPACITOR_*,
        # Console.SetOut/SetError) and rely on [NotInParallel(group)] to
        # serialize among themselves. Cross-group parallel execution still
        # races the shared process state intermittently on the slower
        # Linux CI runner, producing a different flake every run. Until
        # the affected tests are refactored to inject paths/streams
        # rather than mutate Environment/Console, run serially. Local dev
        # runs stay parallel (the flag lives only in CI).
        run: dotnet run --project test/Kapacitor.Cli.Tests.Unit/Kapacitor.Cli.Tests.Unit.csproj -- --maximum-parallel-tests 1

      - name: Run integration tests
        run: dotnet run --project test/Kapacitor.Cli.Tests.Integration/Kapacitor.Cli.Tests.Integration.csproj

  aot-check:
    name: AOT publish check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - src/Kapacitor.Cli/Kapacitor.Cli.csproj
          - src/Kapacitor.Cli.Daemon/Kapacitor.Cli.Daemon.csproj

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish AOT (linux-x64)
        run: dotnet publish ${{ matrix.project }} -c Release -r linux-x64

      - name: Check for trimming warnings
        run: |
          OUTPUT=$(dotnet publish ${{ matrix.project }} -c Release -r linux-x64 2>&1)
          if echo "$OUTPUT" | grep -E 'IL[23][01][0-9]{2}'; then
            echo "::error::AOT/trimming warnings detected"
            echo "$OUTPUT" | grep -E 'IL[23][01][0-9]{2}'
            exit 1
          fi
